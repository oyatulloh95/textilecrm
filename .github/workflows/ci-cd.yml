name: TextileCRM CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  AWS_REGION: eu-central-1
  ECR_REPO_BACKEND: textilecrm-backend
  ECR_REPO_FRONTEND: textilecrm-frontend

jobs:
  # -------------------------------------------------
  # 1) BUILD & TEST
  # -------------------------------------------------
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint backend (basic syntax check)
        working-directory: ./backend
        run: python -m compileall -q .

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install & build frontend
        working-directory: ./frontend
        run: |
          npm install
          npm run build

  # -------------------------------------------------
  # 2) BUILD & PUSH DOCKER IMAGES TO AMAZON ECR
  # -------------------------------------------------
  build-and-push:
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: echo "image_tag=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag and push backend image
        working-directory: ./backend
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          TAG: ${{ steps.vars.outputs.image_tag }}
        run: |
          docker build -t $REGISTRY/$ECR_REPO_BACKEND:$TAG -t $REGISTRY/$ECR_REPO_BACKEND:latest .
          docker push $REGISTRY/$ECR_REPO_BACKEND:$TAG
          docker push $REGISTRY/$ECR_REPO_BACKEND:latest

      - name: Build, tag and push frontend image
        working-directory: ./frontend
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          TAG: ${{ steps.vars.outputs.image_tag }}
        run: |
          docker build \
            --build-arg VITE_API_URL=${{ secrets.VITE_API_URL }} \
            -t $REGISTRY/$ECR_REPO_FRONTEND:$TAG -t $REGISTRY/$ECR_REPO_FRONTEND:latest .
          docker push $REGISTRY/$ECR_REPO_FRONTEND:$TAG
          docker push $REGISTRY/$ECR_REPO_FRONTEND:latest

  # -------------------------------------------------
  # 3) DEPLOY: trigger Auto Scaling Group instance refresh
  #    so new EC2 instances pull the latest images
  # -------------------------------------------------
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Start ASG instance refresh (rolling deploy)
        run: |
          aws autoscaling start-instance-refresh \
            --auto-scaling-group-name ${{ secrets.ASG_NAME }} \
            --preferences '{"MinHealthyPercentage":50,"InstanceWarmup":120}'
